<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIYOKO Ballpool</title>
<meta property="og:title" content="HIYOKO Ballpool" />
<meta property="og:description" content="ひよこがわらわら落ちてくるボールプール" />
<meta property="og:image" content="img/OGP-ballpool.png" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="HIYOKO Ballpool" />
<meta name="twitter:description" content="ひよこがわらわら落ちてくるボールプール" />
<meta name="twitter:image" content="img/OGP-ballpool.png" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f2ed; overflow: hidden; }
  canvas { display: block; }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: #aaa;
    letter-spacing: 0.05em;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hint">クリックで追加 ✦ ドラッグで動かせる</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const { Engine, Runner, Render, Bodies, Body, Composite, Mouse, MouseConstraint, Events } = Matter;

const W = window.innerWidth;
const H = window.innerHeight;

const canvas = document.getElementById('canvas');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// ── SVG → offscreen canvas (logo texture) ─────────────────
const SVG_SRC = `<svg width="111" height="133" viewBox="0 0 111 133" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M110.679 90.4736C110.679 121.037 85.9026 132.455 55.3394 132.455C24.7763 132.455 0 121.037 0 90.4736C0 59.9105 25.6711 38.4736 56.2343 38.4736C86.7974 38.4736 110.679 59.9105 110.679 90.4736Z" fill="#FFD83B"/>
<circle cx="39.3578" cy="69.7216" r="4.53211" fill="#442626"/>
<circle cx="71.3212" cy="69.7216" r="4.53211" fill="#442626"/>
<path d="M75.8532 89.2809C75.8532 96.7899 68.0235 102.877 54.6239 102.877C41.2243 102.877 33.3945 96.7899 33.3945 89.2809C33.3945 81.7719 41.2243 75.6846 54.6239 75.6846C68.0235 75.6846 75.8532 81.7719 75.8532 89.2809Z" fill="#FD9B26"/>
<path d="M36 89.4551L73 89.4551" stroke="#E6840F" stroke-width="2.91" stroke-linecap="round"/>
<path d="M54.9907 22.0147C54.9907 12.4734 59.2843 4.8404 70.2568 2.45508" stroke="#427E5F" stroke-width="4.91" stroke-linecap="round"/>
<path d="M75.5046 38.2349C75.5046 49.696 66.2135 51.8312 54.7523 51.8312C43.2911 51.8312 34 49.696 34 38.2349C34 26.7737 43.2911 21.0605 54.7523 21.0605C66.2135 21.0605 75.5046 26.7737 75.5046 38.2349Z" fill="#E26049"/>
<path d="M51.3988 28.188C52.0677 30.2638 50.0388 31.2663 47.4104 32.1132C44.7821 32.9601 42.5496 33.3306 41.8807 31.2549C41.2119 29.1792 43.4785 27.7229 46.1068 26.876C48.7352 26.0291 50.73 26.1123 51.3988 28.188Z" fill="white"/>
</svg>`;

// Sizes for logo balls
const SIZES = [50, 65, 80];

// Pre-render logos at each size into offscreen canvases
const logoImgs = {};
const svgBlob = new Blob([SVG_SRC], { type: 'image/svg+xml' });
const svgUrl = URL.createObjectURL(svgBlob);

let imagesLoaded = 0;
SIZES.forEach(size => {
  const img = new Image();
  img.onload = () => {
    const oc = document.createElement('canvas');
    oc.width = size;
    oc.height = size * (133 / 111);
    const oc2 = oc.getContext('2d');
    oc2.drawImage(img, 0, 0, oc.width, oc.height);
    logoImgs[size] = oc;
    imagesLoaded++;
  };
  img.src = svgUrl;
});

// ── Physics ───────────────────────────────────────────────
const engine = Engine.create();
const world = engine.world;

const WALL_T = 60;
const ground  = Bodies.rectangle(W / 2, H + WALL_T / 2,     W * 3, WALL_T, { isStatic: true, friction: 0.3, restitution: 0.4 });
const wallL   = Bodies.rectangle(-WALL_T / 2, H / 2,         WALL_T, H * 3, { isStatic: true, friction: 0.3 });
const wallR   = Bodies.rectangle(W + WALL_T / 2, H / 2,      WALL_T, H * 3, { isStatic: true, friction: 0.3 });
Composite.add(world, [ground, wallL, wallR]);

const mouse = Mouse.create(canvas);
const mc = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: 0.2, damping: 0.1, render: { visible: false } }
});
Composite.add(world, mc);

// Track bodies → their logo size
const bodyMeta = new Map(); // body.id → { size, img }

function spawnLogo(x, y) {
  const size = SIZES[Math.floor(Math.random() * SIZES.length)];
  const r = size * 0.45; // collision radius ≈ body size
  const body = Bodies.circle(x, y, r, {
    restitution: 0.5,
    friction: 0.1,
    frictionAir: 0.01,
    density: 0.002,
  });
  bodyMeta.set(body.id, { size, r });
  Composite.add(world, body);
}

// Initial drop
function initialDrop() {
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const x = W * 0.2 + Math.random() * W * 0.6;
      const y = -80 - Math.random() * 300;
      spawnLogo(x, y);
    }, i * 120);
  }
}

// ── Render loop ───────────────────────────────────────────

function drawBody(body) {
  const meta = bodyMeta.get(body.id);
  if (!meta) return;
  const img = logoImgs[meta.size];
  if (!img) return;

  const { x, y } = body.position;
  const angle = body.angle;
  const w = img.width;
  const h = img.height;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Subtle drop shadow
  ctx.shadowColor = 'rgba(68,38,38,0.15)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 6;

  ctx.drawImage(img, -w / 2, -h / 2, w, h);
  ctx.restore();
}

function loop() {
  ctx.fillStyle = '#f7f2ed';
  ctx.fillRect(0, 0, W, H);

  const bodies = Composite.allBodies(world).filter(b => !b.isStatic);
  bodies.forEach(drawBody);

  requestAnimationFrame(loop);
}

// Drive physics with setInterval (works even when tab is backgrounded)
const DELTA = 1000 / 60;
setInterval(() => Engine.update(engine, DELTA), DELTA);

// Wait for at least one image, then start
const waitStart = setInterval(() => {
  if (imagesLoaded > 0) {
    clearInterval(waitStart);
    requestAnimationFrame(loop);
    initialDrop();
  }
}, 50);

// Click to add more (PC)
canvas.addEventListener('click', (e) => {
  if (mc.body) return;
  spawnLogo(e.clientX, -60);
});

// Tap to add more (スマホ)
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const touch = e.changedTouches[0];
  spawnLogo(touch.clientX, -60);
}, { passive: false });

// Cap total bodies at 60
Events.on(engine, 'afterUpdate', () => {
  const bodies = Composite.allBodies(world).filter(b => !b.isStatic);
  if (bodies.length > 60) {
    const oldest = bodies[0];
    bodyMeta.delete(oldest.id);
    Composite.remove(world, oldest);
  }
});

// Resize
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
